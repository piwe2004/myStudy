<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방통대 CS 문제은행</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <div id="home-screen">
            <h1 class="main-title">방통대 CS<br>문제은행 🎓</h1>
            <p class="sub-title">총 600문제 (랜덤 출제)</p>
            <div class="main-tabs">
                <button class="main-tab-btn active" data-tab="knou" onclick="filterTab('knou')">방통대 CS</button>
                <button class="main-tab-btn" data-tab="engineer" onclick="filterTab('engineer')">정보처리기사</button>
            </div>

            <div id="subject-list" class="grid-box"></div>
        </div>

        <div id="quiz-screen" style="display: none;">
            <div class="header">
                <button onclick="goHome()" class="back-btn">← 나가기</button>
                <span id="current-subject-title">과목명</span>
                <span id="progress-text">1 / 100</span>
            </div>
            
            <div class="quiz-content">
                <div class="question-box">
                    <p id="question-text">문제가 여기에 나옵니다.</p>
                </div>

                <div id="options-box" class="options-list">
                    </div>

                <div id="result-box" style="display: none;"></div>

                <button id="next-btn" onclick="nextQuestion()">다음 문제 ▶</button>
            </div>
        </div>
        <div id="score-screen" style="display: none;">
            <div class="score-card">
                <h2>수고하셨습니다! 🎉</h2>
                <p class="score-label">당신의 점수는?</p>
                <div class="score-circle">
                    <span id="final-score">0</span>
                    <span class="unit">점</span>
                </div>
                <div class="stats-box">
                    <div class="stat-item">
                        <span class="label">총 문제</span>
                        <span class="value" id="total-count-display">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">정답</span>
                        <span class="value correct" id="correct-count-display">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">오답</span>
                        <span class="value wrong" id="wrong-count-display">0</span>
                    </div>
                </div>
                <button onclick="goHome()" class="home-btn">메인으로 돌아가기</button>
            </div>
        </div>                                                                                                                                                                                                                                                                  
    </div>

    <script src="script.js"></script>
    <script>
        // 🔥 [새로 추가할 함수] 탭 클릭 시 과목 필터링
        function filterTab(tabId) {
            // 탭 버튼 스타일 활성화 처리
            document.querySelectorAll('.main-tab-btn').forEach(btn => {
                if (btn.getAttribute('data-tab') === tabId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // 과목 카드 보여주기/숨기기
            document.querySelectorAll('.subject-card').forEach(card => {
                if (card.getAttribute('data-category') === tabId) {
                    card.style.display = 'flex'; // style.css에 정의하신 기존 flex 레이아웃 유지
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
